<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Janith GPT</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    
    <link rel="icon" href="../other images/logo.png" type="image/png">
    <link rel="stylesheet" href="gpt-style.css">
</head>
<body>
    <div class="app-container">
        
        <button id="install-btn" class="glass-btn" style="display: none; margin-bottom: 15px; background-color: #00ffcc; color: black;">
            ⬇️ Install Janith GPT to Device
        </button>

        <div id="janith-gpt-container" class="janith-gpt-3d-glass">
          <div class="chat-header">
            <h3>🤖 Janith GPT</h3>
          </div>
          
          <div id="chat-history" class="glass-chat-history">
            <p><strong>Janith GPT:</strong> Hello! I'm Janith GPT. How can I help you today?</p>
          </div>
          
          <div class="chat-input-area">
            <input type="text" id="chat-input" class="glass-chat-input" placeholder="Ask Janith GPT..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()" class="glass-btn action-btn">Send</button>
          </div>
        </div>
    </div>

    <script>
      let conversationHistory = [];

      // --- CHAT LOGIC ---
      async function sendMessage() {
          const inputField = document.getElementById('chat-input');
          const historyBox = document.getElementById('chat-history');
          const userText = inputField.value.trim();

          if (!userText) return;

          historyBox.innerHTML += `<p style="text-align: right; color:#e2e2e2;"><strong>You:</strong> ${userText}</p>`;
          conversationHistory.push({ role: "user", content: userText });
          inputField.value = '';
          
          const loadingId = 'loading-' + Date.now();
          historyBox.innerHTML += `<p id="${loadingId}" style="color: #9d00ff;"><em>Janith GPT is thinking...</em></p>`;
          historyBox.scrollTop = historyBox.scrollHeight;

          try {
              const response = await fetch('/api/chat', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ messages: conversationHistory })
              });

              const data = await response.json();
              if (data.error) throw new Error(data.error);

              const aiText = data.choices[0].message.content;
              document.getElementById(loadingId).remove();
              
              historyBox.innerHTML += `<p style="color:#00ffcc;"><strong>Janith GPT:</strong> ${aiText.replace(/\n/g, '<br>')}</p>`;
              conversationHistory.push({ role: "assistant", content: aiText });

          } catch (error) {
              console.error("ERROR:", error);
              const loader = document.getElementById(loadingId);
              if (loader) loader.innerHTML = `<span style="color:red">Error: ${error.message}</span>`;
          }
          historyBox.scrollTop = historyBox.scrollHeight;
      }

      function handleEnter(event) {
          if (event.key === 'Enter') sendMessage();
      }

      // --- PWA INSTALLATION LOGIC ---
      let deferredPrompt;
      const installBtn = document.getElementById('install-btn');

      // 1. Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registered!'))
            .catch(err => console.error('Service Worker failed', err));
        });
      }

      // 2. Catch the Install Prompt from the Browser
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the default browser mini-infobar from appearing
        e.preventDefault();
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        // Show our custom Install Button
        installBtn.style.display = 'block';
      });

      // 3. What happens when they click our Install Button
      installBtn.addEventListener('click', async () => {
        // Hide the button
        installBtn.style.display = 'none';
        // Show the official browser install prompt
        deferredPrompt.prompt();
        // Wait for the user to respond to the prompt
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        // Clear the prompt variable
        deferredPrompt = null;
      });
    </script>
</body>
</html>
